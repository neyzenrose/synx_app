<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYNX | Universal Media Downloader</title>
    <link rel="icon" type="image/png" href="/static/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Outfit:wght@700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #030408;
            --surface-color: #0d0f17;
            --primary-accent: #6d28d9;
            --secondary-accent: #06b6d4;
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --gradient-accent: linear-gradient(135deg, var(--primary-accent), var(--secondary-accent));
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-primary); min-height: 100vh; display: flex; flex-direction: column; }
        
        nav { padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--glass-border); backdrop-filter: blur(10px); }
        .logo { font-family: 'Outfit', sans-serif; font-size: 28px; font-weight: 800; background: var(--gradient-accent); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; text-decoration: none; }
        .btn-home { color: white; text-decoration: none; font-size: 14px; background: var(--glass-bg); padding: 8px 16px; border-radius: 20px; border: 1px solid var(--glass-border); }

        .container { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
        .card { background: var(--glass-bg); border: 1px solid var(--glass-border); backdrop-filter: blur(30px); padding: 50px 40px; border-radius: 30px; width: 100%; max-width: 650px; box-shadow: 0 40px 100px -20px rgba(0,0,0,0.6); }

        h1 { font-family: 'Outfit', sans-serif; font-size: 38px; text-align: center; margin-bottom: 30px; letter-spacing: -1px; }
        .input-box { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); padding: 18px 24px; border-radius: 12px; color: white; font-size: 16px; margin-bottom: 20px; outline: none; transition: border 0.3s; }
        .input-box:focus { border-color: var(--primary-accent); }

        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        select { background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); padding: 12px; border-radius: 10px; color: white; cursor: pointer; }

        .agree-group { display: flex; gap: 12px; align-items: flex-start; margin: 15px 0 25px; cursor: pointer; }
        .agree-group input { width: 18px; height: 18px; margin-top: 2px; }
        .agree-group label { font-size: 12px; color: var(--text-secondary); line-height: 1.5; }

        .btn-download { width: 100%; background: var(--gradient-accent); color: white; padding: 18px; border-radius: 12px; font-weight: 800; font-size: 18px; border: none; cursor: pointer; transition: transform 0.2s, box-shadow 0.3s; box-shadow: 0 10px 20px -5px rgba(109, 40, 217, 0.4); }
        .btn-download:hover { transform: translateY(-2px); box-shadow: 0 15px 30px -5px rgba(109, 40, 217, 0.6); }
        .btn-download:disabled { opacity: 0.4; cursor: not-allowed; }

        .status { margin-top: 20px; text-align: center; font-size: 14px; font-weight: 600; display: none; }
        .progress { width: 100%; height: 4px; background: rgba(255,255,255,0.1); border-radius: 10px; margin-top: 15px; overflow: hidden; display: none; }
        .progress-fill { height: 100%; width: 0%; background: var(--gradient-accent); transition: width 0.4s; }

        /* Result Card */
        .result-box { display: none; margin-top: 30px; padding: 25px; background: rgba(109, 40, 217, 0.1); border: 2px solid var(--primary-accent); border-radius: 20px; animation: slideUp 0.5s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <nav>
        <a href="/" class="logo">
            <img src="/static/logo.png" alt="SYNX Logo" style="height: 40px;">
            <span>SYNX</span>
            <span style="font-size: 10px; color: var(--text-secondary); opacity: 0.5; margin-left: 10px; font-weight: 400;">VER: SYNC-01</span>
        </a>
        <a href="/" class="btn-home">Back to Home</a>
    </nav>

    <div class="container">
        <div class="card">
            <h1>Start download</h1>
            <p style="text-align: center; color: var(--text-secondary); margin-bottom: 40px; font-size: 15px;">Paste your link below to begin secure extraction.</p>
            
            <input type="text" id="videoUrl" placeholder="https://www.youtube.com/watch?v=..." class="input-box">
            
            <div class="options">
                <select id="format"><option value="mp4">Video (MP4)</option><option value="mp3">Audio (MP3)</option></select>
                <select id="quality"><option value="best">Highest Quality</option><option value="1080">1080p Full HD</option></select>
            </div>

            <div class="agree-group">
                <input type="checkbox" id="agree" checked>
                <label for="agree">I am solely responsible for the content I download. I will use this tool for personal use only and respect copyright laws.</label>
            </div>

            <button onclick="startDownload()" id="dlBtn" class="btn-download">Download Now</button>

            <div id="status" class="status"></div>
            <div id="progress" class="progress"><div id="fill" class="progress-fill"></div></div>

            <!-- RESULT AREA -->
            <div id="result" class="result-box">
                <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 20px;">
                    <div style="font-size: 32px;">🎬</div>
                    <div>
                        <h4 id="title" style="font-size: 18px; color: white;">Media Ready</h4>
                        <p style="font-size: 12px; color: var(--secondary-accent); font-weight: 700;">Verified by Synx Server</p>
                    </div>
                </div>
                <a id="link" href="#" target="_blank" class="btn-download" style="display: block; text-align: center; text-decoration: none;">Save to Device</a>
            </div>
        </div>
    </div>

    <script>
        async function startDownload() {
            const url = document.getElementById('videoUrl').value;
            const agree = document.getElementById('agree').checked;
            const btn = document.getElementById('dlBtn');
            const status = document.getElementById('status');
            const progress = document.getElementById('progress');
            const fill = document.getElementById('fill');
            const result = document.getElementById('result');

            if (!url) { alert('Please paste a link'); return; }
            if (!agree) { alert('You must agree to the terms'); return; }

            btn.disabled = true;
            btn.innerText = 'Processing...';
            status.style.display = 'block';
            status.innerText = 'Connecting to Synx Node...';
            status.style.color = '#fff';
            progress.style.display = 'block';
            fill.style.width = '30%';
            result.style.display = 'none';

            try {
                const resp = await fetch('/api/download', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url })
                });
                const data = await resp.json();

                if (data.status === 'success') {
                    fill.style.width = '100%';
                    status.innerText = 'Extraction Successful!';
                    status.style.color = '#10b981';
                    
                    const fileName = (data.title || "Synx_Media") + ".mp4";
                    document.getElementById('title').innerText = data.title || "Your Media is Ready";
                    
                    const lnk = document.getElementById('link');
                    lnk.href = data.download_url;
                    lnk.setAttribute('download', fileName);
                    
                    result.style.display = 'block';
                    btn.innerText = 'Done!';
                } else { throw new Error(data.message); }
            } catch (e) {
                status.innerText = 'Error: ' + e.message;
                status.style.color = '#ef4444';
                btn.innerText = 'Try Again';
            } finally {
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
