<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYNX | Universal Media Downloader</title>
    <link rel="icon" type="image/png" href="/static/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Outfit:wght@700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #030408;
            --surface-color: #0d0f17;
            --primary-accent: #6d28d9;
            --secondary-accent: #06b6d4;
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --gradient-accent: linear-gradient(135deg, var(--primary-accent), var(--secondary-accent));
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-primary); overflow-x: hidden; min-height: 100vh; display: flex; flex-direction: column; }
        
        nav { padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; backdrop-filter: blur(12px); border-bottom: 1px solid var(--glass-border); position: sticky; top: 0; z-index: 100; }
        .logo { font-family: 'Outfit', sans-serif; font-size: 28px; font-weight: 800; background: var(--gradient-accent); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; text-decoration: none; }
        .btn-back { background: var(--text-primary); color: var(--bg-color); padding: 8px 18px; border-radius: 40px; font-weight: 700; text-decoration: none; font-size: 13px; }

        .hero { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 20px; position: relative; }
        .hero::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 20% 30%, rgba(109, 40, 217, 0.1), transparent 40%), radial-gradient(circle at 80% 70%, rgba(6, 182, 212, 0.05), transparent 40%); z-index: -1; }

        .download-container { background: var(--glass-bg); border: 1px solid var(--glass-border); backdrop-filter: blur(20px); padding: 50px 40px; border-radius: 30px; width: 100%; max-width: 600px; box-shadow: 0 40px 100px -20px rgba(0,0,0,0.5); }
        
        h1 { font-family: 'Outfit', sans-serif; font-size: 42px; font-weight: 800; text-align: center; margin-bottom: 30px; }
        .url-input { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); padding: 18px 24px; border-radius: 12px; color: white; font-size: 16px; margin-bottom: 20px; outline: none; transition: border-color 0.3s; }
        .url-input:focus { border-color: var(--primary-accent); }
        
        .btn-primary { background: var(--gradient-accent); color: white; padding: 16px 36px; border-radius: 12px; font-weight: 700; font-size: 18px; border: none; cursor: pointer; width: 100%; transition: transform 0.2s, box-shadow 0.3s; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 30px -5px rgba(109, 40, 217, 0.5); }
        .btn-primary:active { transform: translateY(0); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

        .terms-wrap { display: flex; gap: 10px; align-items: flex-start; margin-bottom: 25px; cursor: pointer; }
        .terms-wrap input { width: 18px; height: 18px; border-radius: 4px; border: 1px solid var(--glass-border); background: rgba(255,255,255,0.05); cursor: pointer; margin-top: 2px; }
        .terms-wrap label { font-size: 12px; color: var(--text-secondary); line-height: 1.4; user-select: none; }

        .status-box { margin-top: 20px; padding: 12px; border-radius: 10px; font-size: 14px; text-align: center; display: none; }
        .progress-wrap { margin-top: 25px; display: none; }
        .progress-bar { width: 100%; height: 6px; background: rgba(255,255,255,0.05); border-radius: 10px; overflow: hidden; }
        .progress-fill { height: 100%; width: 0%; background: var(--gradient-accent); transition: width 0.4s ease-out; }

        .result-card { display: none; margin-top: 30px; padding: 25px; background: rgba(109, 40, 217, 0.05); border: 2px solid var(--primary-accent); border-radius: 20px; animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <nav>
        <a href="/" class="logo">SYNX</a>
        <a href="/" class="btn-back">Back to Home</a>
    </nav>

    <div class="hero">
        <div class="download-container">
            <h1>Start download</h1>
            
            <input type="text" id="videoUrl" placeholder="Paste YouTube link here..." class="url-input" autocomplete="off">
            
            <div class="terms-wrap" onclick="document.getElementById('agreeCheck').click()">
                <input type="checkbox" id="agreeCheck" checked onclick="event.stopPropagation()">
                <label>I agree to only download content for personal use and respect copyright laws. I am solely responsible for the content I acquire.</label>
            </div>

            <button onclick="startDownload()" id="downloadBtn" class="btn-primary">Download Now</button>

            <div id="statusMessage" class="status-box"></div>
            
            <div id="progressWrap" class="progress-wrap">
                <div class="progress-bar"><div id="progressFill" class="progress-fill"></div></div>
                <p style="font-size: 12px; color: var(--text-secondary); text-align: center; margin-top: 10px;">Synx Engine Processing...</p>
            </div>

            <div id="resultCard" class="result-card">
                <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 25px;">
                    <div style="font-size: 32px;">🎬</div>
                    <div>
                        <h4 id="videoTitle" style="font-size: 18px; color: white;">Media Prepared</h4>
                        <p style="font-size: 12px; color: var(--secondary-accent); font-weight: 600;">Verified by Synx Engine</p>
                    </div>
                </div>
                <a id="downloadLink" href="#" target="_blank" class="btn-primary" style="display: block; text-align: center; text-decoration: none; font-size: 16px;">Download Now</a>
                <p style="font-size: 11px; text-align: center; color: var(--text-secondary); margin-top: 15px; opacity: 0.6;">Your unique download link is ready.</p>
            </div>
        </div>
    </div>

    <script>
        async function startDownload() {
            const urlInput = document.getElementById('videoUrl');
            const url = urlInput.value.trim();
            const agree = document.getElementById('agreeCheck').checked;
            const btn = document.getElementById('downloadBtn');
            const progress = document.getElementById('progressWrap');
            const progressFill = document.getElementById('progressFill');
            const resultCard = document.getElementById('resultCard');
            const videoTitle = document.getElementById('videoTitle');
            const downloadLink = document.getElementById('downloadLink');

            if (!url) { showStatus('Please paste a link first', 'error'); return; }
            if (!agree) { showStatus('Please agree to terms', 'error'); return; }

            // Reset UI
            btn.disabled = true;
            btn.innerText = 'Analyzing...';
            progress.style.display = 'block';
            progressFill.style.width = '20%';
            resultCard.style.display = 'none';

            try {
                const response = await fetch('/api/download', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url })
                });
                
                if (!response.ok) throw new Error('Synx Engine Busy');
                
                const data = await response.json();

                if (data.status === 'success') {
                    progressFill.style.width = '100%';
                    videoTitle.innerText = data.title || "Your Media is Ready";
                    downloadLink.href = data.download_url;
                    resultCard.style.display = 'block';
                    btn.innerText = 'Ready!';
                    showStatus('Found! Access your download below.', 'success');
                } else {
                    throw new Error(data.message || 'Error finding media');
                }
            } catch (err) {
                showStatus('Engine Error: ' + err.message, 'error');
                btn.innerText = 'Try Again';
            } finally {
                btn.disabled = false;
            }
        }

        function showStatus(msg, type) {
            const status = document.getElementById('statusMessage');
            status.style.display = 'block';
            status.innerText = msg;
            status.style.background = type === 'error' ? 'rgba(239, 68, 68, 0.1)' : 'rgba(16, 185, 129, 0.1)';
            status.style.color = type === 'error' ? '#ef4444' : '#10b981';
        }
    </script>
</body>
</html>
