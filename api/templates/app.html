<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYNX | Universal Media Downloader</title>
    <meta name="description" content="Download video and audio from any platform with SYNX.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="/static/logo.png">
    <style>
        :root {
            --bg-color: #030408;
            --surface-color: #0d0f17;
            --primary-accent: #6d28d9;
            --secondary-accent: #06b6d4;
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --gradient-text: linear-gradient(135deg, #fff 0%, #94a3b8 100%);
            --gradient-accent: linear-gradient(135deg, var(--primary-accent), var(--secondary-accent));
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-primary); overflow-x: hidden; line-height: 1.6; }
        
        nav { position: fixed; top: 0; width: 100%; padding: 20px 40px; display: flex; justify-content: space-between; align-items: center; backdrop-filter: blur(12px); border-bottom: 1px solid var(--glass-border); z-index: 1000; }
        .logo { font-family: 'Outfit', sans-serif; font-size: 28px; font-weight: 800; background: var(--gradient-accent); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; text-decoration: none; display: flex; align-items: center; gap: 10px; }
        .btn-app { background: var(--text-primary); color: var(--bg-color); padding: 10px 24px; border-radius: 40px; font-weight: 700; font-size: 14px; text-decoration: none; }

        .hero { padding: 160px 20px 100px; max-width: 1200px; margin: 0 auto; text-align: center; }
        .download-container { background: var(--glass-bg); border: 1px solid var(--glass-border); backdrop-filter: blur(20px); padding: 50px 40px; border-radius: 30px; max-width: 700px; margin: 0 auto; text-align: left; box-shadow: 0 40px 100px -20px rgba(0,0,0,0.5); }
        
        h1 { font-family: 'Outfit', sans-serif; font-size: clamp(32px, 5vw, 42px); color: white; margin-bottom: 12px; text-align: center; }
        .url-input { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); padding: 18px 24px; border-radius: 12px; color: white; font-size: 16px; margin-bottom: 20px; outline: none; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 20px; }
        .select-input { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); padding: 14px 20px; border-radius: 12px; color: white; cursor: pointer; }
        
        .btn-primary { background: var(--gradient-accent); color: white; padding: 16px 36px; border-radius: 12px; font-weight: 700; font-size: 18px; text-decoration: none; box-shadow: 0 10px 40px -10px rgba(109, 40, 217, 0.5); border: none; cursor: pointer; transition: all 0.3s; }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

        .status-box { margin-top: 20px; padding: 15px; border-radius: 10px; font-size: 14px; text-align: center; display: none; }
        .progress-container { margin-top: 20px; display: none; }
        .progress-bar { width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; margin-bottom: 10px; }
        .progress-bar-fill { height: 100%; width: 0%; background: var(--gradient-accent); transition: width 0.3s; }
        
        /* Result Card Styling */
        .result-card { display: none; margin-top: 30px; padding: 25px; background: rgba(109, 40, 217, 0.1); border: 2px solid var(--primary-accent); border-radius: 20px; animation: slideIn 0.5s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <nav>
        <a href="/" class="logo">
            <img src="/static/logo.png" alt="SYNX Logo" style="height: 40px;">
            <span>SYNX</span>
        </a>
        <a href="/" class="btn-app">Back to Home</a>
    </nav>

    <section class="hero">
        <div class="download-container">
            <h1>Start download</h1>
            <p style="text-align: center; color: var(--text-secondary); margin-bottom: 30px;">Paste a link from 1000+ supported sites.</p>
            
            <input type="text" id="videoUrl" placeholder="Paste link here..." class="url-input">
            
            <div class="options-grid">
                <select id="formatType" class="select-input">
                    <option value="mp4">Video (MP4)</option>
                    <option value="mp3">Audio (MP3)</option>
                </select>
                <select id="qualityType" class="select-input">
                    <option value="best">Highest Quality</option>
                    <option value="1080">Full HD</option>
                </select>
            </div>

            <button onclick="startDownload()" id="downloadBtn" class="btn-primary" style="width: 100%;">Download Now</button>

            <div id="statusMessage" class="status-box"></div>
            
            <div id="progressContainer" class="progress-container">
                <div class="progress-bar"><div id="progressBarFill" class="progress-bar-fill"></div></div>
                <p id="progressText" style="font-size: 12px; color: var(--text-secondary);">Processing...</p>
            </div>

            <!-- RESULT CARD -->
            <div id="resultCard" class="result-card">
                <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 20px;">
                    <div style="width: 50px; height: 50px; background: var(--gradient-accent); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 24px;">🎬</div>
                    <div>
                        <h4 id="videoTitle" style="font-size: 18px; color: white;">Media Ready</h4>
                        <p style="font-size: 12px; color: var(--secondary-accent);">Verified by Synx Engine</p>
                    </div>
                </div>
                <a id="downloadLink" href="#" target="_blank" class="btn-primary" style="width: 100%; display: block; text-align: center;">Download Now</a>
            </div>
        </div>
    </section>

    <script>
        async function startDownload() {
            const url = document.getElementById('videoUrl').value;
            const btn = document.getElementById('downloadBtn');
            const progress = document.getElementById('progressContainer');
            const progressFill = document.getElementById('progressBarFill');
            const resultCard = document.getElementById('resultCard');
            const videoTitle = document.getElementById('videoTitle');
            const downloadLink = document.getElementById('downloadLink');

            if (!url) return;

            btn.disabled = true;
            btn.innerText = 'Initializing...';
            progress.style.display = 'block';
            progressFill.style.width = '20%';
            resultCard.style.display = 'none';

            try {
                const response = await fetch('/api/download', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url })
                });
                const data = await response.json();

                if (data.status === 'success') {
                    progressFill.style.width = '100%';
                    videoTitle.innerText = data.title || "Your Media is Ready";
                    downloadLink.href = data.download_url;
                    resultCard.style.display = 'block';
                    btn.innerText = 'Ready!';
                    showStatus('Found! Click Download Now below.', 'success');
                } else {
                    throw new Error(data.message);
                }
            } catch (err) {
                showStatus('Error: ' + err.message, 'error');
                btn.innerText = 'Try Again';
            } finally {
                btn.disabled = false;
            }
        }

        function showStatus(msg, type) {
            const status = document.getElementById('statusMessage');
            status.style.display = 'block';
            status.innerText = msg;
            status.style.background = type === 'error' ? 'rgba(239, 68, 68, 0.1)' : 'rgba(16, 185, 129, 0.1)';
            status.style.color = type === 'error' ? '#ef4444' : '#10b981';
        }
    </script>
</body>
</html>
